<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Rádio Online | Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .background-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Botão Pedir Música */
        .btn-pedido {
            display: inline-block;
            margin-bottom: 25px;
            padding: 10px 25px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-pedido:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        .player-wrapper {
            background: #000;
            padding: 10px;
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>

    <script type="text/javascript">
        function abrir_pedido(url, largura, altura) {
            window.open(url, "", "width=" + largura + ",height=" + altura + ",toolbar=no,location=no,directories=no,status=yes,menubar=no,scrollbars=yes,resizable=NO");
        }
    </script>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <div class="logo">Minha Rádio</div>
        
        <a class="btn-pedido" href="javascript:abrir_pedido('http://player.ipstm.net/pedido/64762','505','180');">
            🎵 Pedir Música
        </a>
        
        <div class="player-wrapper">
            <iframe src="https://player.ipstm.net/player-barra/64762/000000" frameborder="0" width="100%" height="31"></iframe>
        </div>

        <footer>
            &copy; 2026 - Programação 24 Horas
        </footer>
    </div>

</body>
</html>
